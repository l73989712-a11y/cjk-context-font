<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>CJKCF E2E</title></head>
<body>
  <p id="ja">残酷な天使のテーゼ</p>
  <p id="zh">这个视频真的很好看</p>
  <p id="hant">這個影片真的很好看</p>
  <p id="ambiguous">自然</p>
  <div id="complex">中文 <strong>ゲーム</strong> 混合结构</div>
  <ruby id="ruby" data-kt-generated="true">ゲーム<rt>game</rt></ruby>
  <section id="dynamic"></section>
  <script>
    window.addDynamicItems = function (count) {
      const root = document.getElementById("dynamic");
      const fragment = document.createDocumentFragment();
      for (let index = 0; index < count; index += 1) {
        const p = document.createElement("p");
        p.textContent = index % 2 ? "君の名は。" : "这个动态评论很好看";
        fragment.append(p);
      }
      root.append(fragment);
    };
  </script>
</body>
</html>
