<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>CJK Context Font 0.2.1 测试页</title>
  <style>
    body { max-width: 860px; margin: 40px auto; padding: 0 20px; font: 20px/1.8 sans-serif; }
    article { border-bottom: 1px solid #bbb; padding: 12px 0; }
    code { font-size: 14px; }
  </style>
</head>
<body>
  <h1>CJK Context Font 0.2.1 测试</h1>
  <article id="simple-cn">中文：这个标题应该使用简体中文字体。</article>
  <article id="simple-ja">日本語：残酷な天使のテーゼ</article>
  <article id="quoted">混合引号：我很喜欢《君の名は。》这部动画。</article>
  <article id="inline">无标点混合：我喜欢君の名は很好看</article>
  <article id="han-title">纯汉字 ACG 标题：紅蓮華</article>
  <article id="local-lang" lang="ja">纯汉字但有局部 lang：鬼滅之刃</article>
  <article id="traditional" lang="zh-TW">繁體中文：這個標題應該使用繁體中文字體。</article>
  <article id="korean">한국어: 한글과 漢字가 함께 있는 문장입니다.</article>
  <article id="nested">混合结构：我喜欢 <strong>進撃の巨人</strong> 和 <em lang="ja">紅蓮華</em>。</article>
  <article id="dynamic">动态评论将在一秒后出现。</article>
  <script>
    setTimeout(() => {
      document.getElementById("dynamic").textContent = "新评论：这首《残酷な天使のテーゼ》真的很好听。";
    }, 1000);
  </script>
  <article>
    ruby 兼容测试：
    <ruby data-kt-generated="true">ゲーム<rt>game</rt></ruby>
    （扩展不得在 ruby 内插入 span 或修改 rt）
  </article>
</body>
</html>
